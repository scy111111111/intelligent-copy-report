
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>智能文案分析报告</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .metric { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .metric h3 { margin: 0; color: #333; }
        .metric .value { font-size: 24px; font-weight: bold; color: #e74c3c; }
    </style>
</head>
<body>
    <h1>智能文案分析报告</h1>
    <h2>Layer1: 整体效果</h2>
    <div class="metric">
        <h3>增量订单</h3>
        <div class="value">1000</div>
    </div>
    <div class="metric">
        <h3>增量UV</h3>
        <div class="value">5000</div>
    </div>
    <div class="metric">
        <h3>增量交易额</h3>
        <div class="value">50000.0</div>
    </div>
    
    <h2>Layer2: 实验归因</h2>
    <table border="1" cellpadding="10">
        <tr>
            <th>实验ID</th>
            <th>文案</th>
            <th>判定</th>
            <th>策略建议</th>
        </tr>

        <tr>
            <td>exp001</td>
            <td>测试文案A</td>
            <td>正向提升</td>
            <td>建议扩大放量</td>
        </tr>

    </table>
</body>
</html>
